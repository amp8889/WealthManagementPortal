<h1>User registration</h1>

<button type="button" (click)="showRegistrationCodeDialog()">I have a registration code</button>
<button type="button">Register without a code</button>

<p-dialog header="Register with Code" [(visible)]="registrationCodeDialogVisible" [modal]="true">

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <div>
            <label for="role">I am a new:</label>
            <p-select id="role" formControlName="role" [options]="roleOptions" optionLabel="label" optionValue="value"
                placeholder="Select role">
            </p-select>
        </div>

        <div>
            <label for="registrationCode">Registration code:</label>
            <p-inputMask mask="********-****-****-****-************" formControlName="registrationCode"
                placeholder="Enter your registration code">
            </p-inputMask>
        </div>

        <ng-template pTemplate="footer">
            <div>
                <button pButton label="Cancel" type="button" severity="secondary" [outlined]="true"
                    (click)="hideRegistrationCodeDialog()">
                </button>
                <button pButton label="Register" [disabled]="registerForm.invalid">
                </button>
            </div>
        </ng-template>
    </form>
</p-dialog>
