<p-menubar [model]="items">

  <ng-template pTemplate="start">
    <span class="text-xl font-bold cursor-default">
      Wealth Portal
    </span>
  </ng-template>

  <ng-template pTemplate="end">
    <button
      *ngIf="isLoggedIn()"
      pButton
      label="Logout"
      icon="pi pi-sign-out"
      (click)="logout()">
    </button>

    <button
      *ngIf="!isLoggedIn()"
      pButton
      label="Login"
      icon="pi pi-sign-in"
      (click)="login()">
    </button>
  </ng-template>

</p-menubar>
